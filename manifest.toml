#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "open-webui"
name = "Open WebUI"
description.en = "User-friendly AI Interface (Supports Ollama, OpenAI API, ...)"
description.fr = "Interface IA conviviale (Supporte Ollama, API OpenAI, ...)"

version = "0.8.10~ynh1"

maintainers = ["DeMiro5001"]

[upstream]
license = "BSD-3-Clause"
website = "https://openwebui.com/"
admindoc = "https://docs.openwebui.com/getting-started/"
userdoc = "https://docs.openwebui.com/category/-tutorials"
code = "https://github.com/open-webui/open-webui"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"

architectures = "all"
multi_instance = false

ldap = true
sso = false

disk = "10G"
ram.build = "250M"
ram.runtime = "2G"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "all_users"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["fr", "en"]
    default = "fr"

    [install.admin]
    type = "user"

    [install.rag_embedding_engine]
    ask.en = "Embedding engine for RAG (document search)"
    ask.fr = "Moteur d'embedding pour le RAG (recherche documentaire)"
    help.en = "Use 'ollama' if Ollama is running locally (avoids downloading a ~1GB model). Use 'openai' for OpenAI-compatible APIs (configure the API key in the admin panel after install). Leave empty to use a built-in local model (slow first start)."
    help.fr = "Utilisez 'ollama' si Ollama tourne localement (évite le téléchargement d'un modèle de ~1Go). Utilisez 'openai' pour les API compatibles OpenAI (configurez la clé API dans le panneau d'administration après l'installation). Laissez vide pour utiliser un modèle local intégré (premier démarrage lent)."
    type = "select"
    choices = ["ollama", "openai", ""]
    default = "ollama"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/open-webui/open-webui/archive/refs/tags/v0.8.10.tar.gz"
    sha256 = "878d2a6d20021d84ddffe362a4bee825d72295a67e7030e128e8707b5cc30f8f"

    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "ffmpeg, python3-venv, python3-pip, python3-dev" 
